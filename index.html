<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; }
  .wrap { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  iframe { 
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; 
    height: calc(100% + 60px); /* clips the footer */
    border: none;
  }
</style>
</head>
<body>
  <div class="wrap">
    <iframe src="https://docs.google.com/spreadsheets/d/1nE39fr1nAA3Lj2yJjhpKe6lA1iRAIlS0l16qw7EOp6M/gviz/tq?tqx=out:html&gid=1058408808&range=B4:G14"></iframe>
  </div>
</body>
</html>
