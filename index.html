<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; }
  .wrap { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  iframe { 
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; 
    height: calc(100% + 60px);
    border: none;
  }
  .error {
    padding: 20px;
    font-family: sans-serif;
    color: #666;
  }
</style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="error" id="error" style="display:none">No URL provided. Add ?url=YOUR_ENCODED_URL to the address.</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (url) {
      const iframe = document.createElement('iframe');
      iframe.src = decodeURIComponent(url);
      document.querySelector('.wrap').appendChild(iframe);
    } else {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
